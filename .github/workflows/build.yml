name: Build, verify, and release

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # needed to upload assets on a release event

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify canonical data (verify.py)
        run: python3 scripts/verify.py

      - name: Regenerate exports (build_exports.py)
        run: python3 scripts/build_exports.py

      - name: Confirm committed exports are up to date
        run: |
          if ! git diff --quiet --exit-code exports/; then
            echo "::error::exports/ is out of date. Run 'python3 scripts/build_exports.py' locally and commit the result."
            git --no-pager diff --stat exports/
            exit 1
          fi

      - name: Attach exports to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            exports/geojson/*.geojson \
            exports/gtfs/*.zip \
            --clobber
